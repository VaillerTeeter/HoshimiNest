---
name: PR Review Command

permissions:
  contents: read
  pull-requests: write

on:
  issue_comment:
    types: [created]

jobs:
  ai-review:
    if: github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/review-all') ||
      contains(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: AI Code Review
        run: node .github/scripts/ai-review.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.CLINE_API_KEY }}
          OPENAI_API_ENDPOINT: https://api.cline.bot/api/v1
          MODEL: deepseek/deepseek-v4-pro
          LANGUAGE: Chinese
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          REVIEW_MODE: ${{ contains(github.event.comment.body, '/review-all') && 'full' || 'diff' }}
