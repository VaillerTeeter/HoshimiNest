---
# ansible-lint — Ansible Playbook / Role / Collection lint 配置
# 文档：https://ansible.readthedocs.io/projects/lint/
# 用法：ansible-lint --config-file .lintrc/infrastructure/ansible/.ansible-lint.yml

# ============================================================
# 配置文件格式版本
# ============================================================

# 使用的规则配置文件
# profile: min | basic | moderate | safety | shared | production
profile: production

# ============================================================
# 规则集选择
# ============================================================
# 启用的规则标签（默认启用 profile 内所有规则）
warn_list:
  - experimental   # 实验性规则仅发出警告
  - no-changed-when  # command/shell task 建议添加 changed_when（警告级）

# 强制 error 的规则标签（即使 profile 中设为 warn）
# error_list:
#   - risky-shell-pipe  # 使用管道时必须 set -o pipefail

# 跳过的规则 ID 或标签（全局）
skip_list:
  # yaml[line-length]: 对内嵌 shell 脚本的 task 不强制行宽
  - yaml[line-length]
  # 允许 name[missing]：脚本类 task 可以没有 name（不推荐但兼容旧代码）
  # - name[missing]

# ============================================================
# 文件/目录排除
# ============================================================
exclude_paths:
  - .git/
  - .github/
  - vendor/
  - node_modules/
  - molecule/
  - "*.egg-info/"

# ============================================================
# 可接受的文件格式（lint 范围）
# ============================================================
kinds:
  - yaml: "**/*.yml"
  - yaml: "**/*.yaml"

# ============================================================
# 自动修复模式
# ============================================================
# true: ansible-lint 在 CI 中自动修复后检查是否还有问题
# false: 仅报告，不修改文件
write_list:
  - yaml  # 自动格式化 YAML

# ============================================================
# 常用规则说明（production profile 已包含）
# ============================================================
# command-instead-of-module      优先使用 Ansible 模块而非 shell 命令
# deprecated-*                   废弃的模块/参数/语法
# fqcn[action]                   使用 FQCN（如 ansible.builtin.copy 替代 copy）
# key-order[task]                task 关键字顺序（name 必须在前）
# name[casing]                   task name 首字母大写
# name[missing]                  task 必须有 name
# no-free-form                   禁止自由格式 task（使用键值对格式）
# no-jinja-when                  when 条件禁止使用 Jinja2 模板语法
# partial-become                 become 必须同时设置 become_user
# risky-file-permissions         file/template 必须指定 mode
# risky-shell-pipe               shell 管道必须 set -o pipefail
# syntax-check                   基础语法检查

# ============================================================
# Ansible 环境配置
# ============================================================
# mock_modules: []   # 模拟不存在的自定义模块（避免 module-not-found 错误）
# mock_roles: []     # 模拟不存在的 role

# 允许的 Jinja2 表达式
# strict: true  # 严格模式（变量必须定义）

# ============================================================
# 输出格式
# ============================================================
# parseable: false
# quiet: false
# verbosity: 1
