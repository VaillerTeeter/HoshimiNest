---
# Checkov 配置 — IaC 安全扫描
# 文档：https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html
# 用法：checkov --config-file .lintrc/infrastructure/checkov.yaml

# ============================================================
# 基础设置
# ============================================================
# 扫描目录（相对于项目根目录）
directory:
  - .

# 输出格式：cli, json, junitxml, github_failed_only, sarif
output:
  - cli
  - sarif

# SARIF 输出路径（供 GitHub Code Scanning 上传）
output-file-path: reports/checkov

# 退出代码：1 = 有 failed checks 时报错
soft-fail: false

# ============================================================
# 框架（仅扫描以下类型）
# ============================================================
framework:
  - terraform
  - cloudformation
  - kubernetes
  - dockerfile
  - github_actions
  - helm
  - bicep
  - arm
  - secrets
  - ansible
  - openapi
  - sca_package

# ============================================================
# 跳过的检查（误报率高或项目不适用）
# ============================================================
skip-check:
  # Terraform AWS — 不强制 CloudTrail（仅用于示例仓库）
  - CKV_AWS_67
  # Terraform — 允许模块没有版本约束（示例代码）
  - CKV_TF_1
  # Dockerfile — 允许使用 latest 标签（CI 构建器镜像）
  # - CKV_DOCKER_7  # 如需允许，取消注释

# ============================================================
# 严重级别过滤
# ============================================================
# 将以下 severity 视为 error（CI 中断）
# 其余作为 warning 继续执行
# （注：checkov 本身无此字段，通过 --soft-fail-on 实现）

# ============================================================
# Secrets 检测
# ============================================================
# 使用 Checkov 内置 secrets runner
# 覆盖：AWS keys, GitHub tokens, private keys, passwords, JWT, etc.
enable-secret-scan-all-files: true

# ============================================================
# 外部模块 / Terraform Registry
# ============================================================
# 下载外部模块以扫描其内部（更彻底，扫描第三方模块的安全问题）
download-external-modules: true

# ============================================================
# 文件排除
# ============================================================
skip-path:
  - node_modules
  - .git
  - .lintrc
  - vendor
  - .terraform
  - dist
  - build
  - tests/fixtures
  - "**/*.test.tf"

# ============================================================
# 自定义检查目录
# ============================================================
# 如有自定义检查规则，放在此目录
# external-checks-dir:
#   - .lintrc/infrastructure/checkov-custom

# ============================================================
# 报告选项
# ============================================================
# 压缩通过的检查（只显示失败）
compact: false
quiet: false
