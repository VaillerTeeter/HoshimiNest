---
# Hadolint — Dockerfile lint 配置
# 文档：https://github.com/hadolint/hadolint
# 用法：hadolint --config .lintrc/infrastructure/docker/.hadolint.yaml Dockerfile

# ============================================================
# 忽略特定规则（全局）
# ============================================================
ignore: []
# DL3008: apt-get 安装时固定版本号 — 基础镜像构建中有时不现实
# - DL3008

# DL3009: 删除 apt-get 缓存 — 已通过 dockerfile best practice 推荐
# - DL3009

# SC2086: 双引号变量展开 — 在 Dockerfile 中较为常见
# - SC2086

# ============================================================
# 规则严重级别覆盖
# ============================================================
override:
  # 提升为 error（默认 warning）
  error:
    - DL3001  # 使用了不安全的 curl/wget（不验证证书）
    - DL3002  # 切换到 root 用户
    - DL3003  # 使用 WORKDIR 替代 cd
    - DL3007  # FROM 必须使用固定版本标签（不允许 :latest）
    - DL3020  # 使用 COPY 替代 ADD（除非需要解压/URL）
    - DL3025  # JSON 格式的 CMD/ENTRYPOINT（不允许 shell 格式）
    - DL3047  # wget / curl 下载时禁止忽略证书（--insecure）
    - DL4000  # MAINTAINER 已废弃，使用 LABEL 替代
    - DL4001  # wget 和 curl 冲突使用

  # 降级为 warning（默认 error）
  warning: []

  # 静默（不报告）
  info:
    - DL3059  # RUN 指令之间不需要空行

# ============================================================
# Shell 检查配置（Hadolint 内置 ShellCheck）
# ============================================================
# ShellCheck 规则覆盖
# SC2086: 引号变量 — 在 Dockerfile RUN 中较常见
# SC2016: 单引号变量 — 有时是故意的

# ============================================================
# 可信注册中心（允许在 FROM 中使用的镜像源）
# ============================================================
trustedRegistries:
  - docker.io
  - ghcr.io
  - mcr.microsoft.com
  - registry.access.redhat.com
  - gcr.io
  - quay.io
  - public.ecr.aws

# ============================================================
# 不允许的指令（从安全角度强制）
# ============================================================
# 这些通过规则已覆盖，此处为示例
# forbidden:
#   - MAINTAINER   # 已废弃

# ============================================================
# 格式
# ============================================================
format: tty  # tty / json / checkstyle / codeclimate / gitlab_codeclimate / gnu / codacy / sonarqube / sarif
failure-threshold: error  # 只有 error 级别才使 CI 失败
