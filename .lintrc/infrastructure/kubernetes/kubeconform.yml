---
# kubeconform 配置说明 — Kubernetes 资源清单 Schema 验证
# 工具文档：https://github.com/yannh/kubeconform
# 用法示例（无内置 config 文件支持，参数通过 CI 传入）：
#
#   kubeconform \
#     -schema-location default \
#     -schema-location \
#       'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/
#        {{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
#     -kubernetes-version 1.30.0 \
#     -strict \
#     -summary \
#     -output json \
#     k8s/

# ============================================================
# CI 中推荐的 kubeconform 调用参数（供 lint.yml 引用）
# ============================================================
kubeconform:
  # Kubernetes 目标版本
  kubernetes-version: "1.32.0"

  # Schema 来源：
  #   default = https://raw.githubusercontent.com/yannh/kubernetes-json-schema
  #   CRDs catalog = datreeio 社区维护的 CRD 目录
  schema-locations:
    - "default"
    - "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"

  # 严格模式：禁止未知字段（对应 --strict）
  strict: true

  # 汇总报告（对应 --summary）
  summary: true

  # 输出格式：text | json | tap | junit | pretty
  output: "text"

  # 忽略文件/目录（glob 模式）
  ignore-filename-pattern:
    - "kustomization.yaml"
    - "kustomization.yml"
    - "Chart.yaml"
    - "**/charts/**"
    - "**/crds/**"
    - "**/*_secret.yaml"
    - "**/*.tpl"

  # 允许跳过无法解析 Schema 的资源（CRDs 未在目录中时）
  skip-tls-verify: false
  ignore-missing-schemas: true

# ============================================================
# 扫描目录
# ============================================================
scan-paths:
  - k8s/
  - kubernetes/
  - manifests/
  - helm/
  - deploy/

# ============================================================
# 必须满足的资源规范（文档性说明，非 kubeconform 原生字段）
# ============================================================
requirements:
  # 所有工作负载必须设置资源限制
  resource-limits: required
  # 所有容器必须设置健康检查
  health-probes: required
  # 所有 Deployment 必须设置反亲和性（可用性）
  pod-anti-affinity: recommended
  # 禁止 privileged 容器
  privileged-containers: forbidden
  # 禁止 hostNetwork/hostPID/hostIPC
  host-namespaces: forbidden
  # 必须设置安全上下文
  security-context: required
  # 所有 Service 必须指定 selector
  service-selector: required
  # Namespace 不得使用 default
  no-default-namespace: required
