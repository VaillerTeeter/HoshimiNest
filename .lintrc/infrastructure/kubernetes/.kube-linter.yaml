---
# KubeLinter — Kubernetes Manifests 最佳实践检查配置
# 文档：https://docs.kubelinter.io/
# 用法：kube-linter lint --config .lintrc/infrastructure/kubernetes/.kube-linter.yaml <path>

# ============================================================
# 检查范围
# ============================================================
checks:
  # 从全部内置检查开始，按需排除
  addAllBuiltIn: true

  # 排除与项目场景不符的检查
  exclude:
    # 某些 Job/CronJob 不需要 liveness probe
    - "no-liveness-probe"
    # 某些初始化容器不需要 resource limits
    # - "resource-request-limit"
    # 允许特权容器（有明确业务需求时取消注释并说明原因）
    # - "privileged-container"

  # 自定义检查
  customChecks:
    # ── 示例：禁止使用 :latest 镜像标签 ─────────────────────
    - name: "no-latest-image-tag"
      description: "Container images must not use the :latest tag"
      template: "disallow-tag"
      params:
        tag: "latest"
      scope:
        objectKinds:
          - DeploymentLike

    # ── 示例：Deployment 必须设置副本数 ──────────────────────
    - name: "minimum-replicas"
      description: "Deployments should have at least 2 replicas for HA"
      template: "minimum-replicas"
      params:
        minReplicas: 2
      scope:
        objectKinds:
          - Deployment

# ============================================================
# 内置检查说明（addAllBuiltIn = true 时已包含）
# ============================================================
# container-security:
#   no-privileged-container        禁止 privileged: true
#   no-privilege-escalation        禁止 allowPrivilegeEscalation: true
#   run-as-non-root                容器必须以非 root 用户运行
#   read-only-root-filesystem      根文件系统设为只读
#   drop-net-raw-capability        禁止 NET_RAW capability
#   no-host-ipc                    禁止 hostIPC: true
#   no-host-pid                    禁止 hostPID: true
#   no-host-network                禁止 hostNetwork: true
#
# resource-management:
#   cpu-requests / memory-requests    必须设置资源请求
#   cpu-limits / memory-limits        必须设置资源限制
#
# reliability:
#   no-readiness-probe             必须设置 readiness probe
#   no-liveness-probe              必须设置 liveness probe（已排除）
#   pod-disruption-budget          应配置 PodDisruptionBudget
#
# images:
#   no-latest-image-tag            自定义规则（见上）
#
# labels:
#   required-label                 推荐设置 app/tier 等标签
