---
disabled_rules:  # rule identifiers turned off for your project
  - todo_syntax
  # trailing_closure — 已移至 opt_in_rules 启用，最严格模式要求尾随闭包
  # - force_cast           # 如需允许 force cast 时取消注释
  # - force_try            # 如需允许 force try 时取消注释

opt_in_rules:  # some rules are turned off by default, so you need to opt-in
  # 格式化
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - let_var_whitespace
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - raw_value_for_camel_case_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_deinit
  - required_enum_case
  - single_test_class
  - sorted_enum_cases
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - strong_iboutlet
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition

analyzer_rules:  # rules run by `swiftlint analyze`
  - explicit_self
  - unused_declaration
  - unused_import

included:  # paths to include during linting
  - Sources
  - Source
  - App
  - Tests

excluded:  # paths to ignore during linting
  - ${PWD}/Carthage
  - ${PWD}/.build
  - ${PWD}/Pods
  - ${PWD}/DerivedData
  - ${PWD}/.swiftpm
  - ${PWD}/vendor

# ============================================================
# 规则参数配置
# ============================================================
line_length:
  warning: 120
  error: 120
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: true

file_length:
  warning: 400
  error: 400
  ignore_comment_only_lines: true

function_body_length:
  warning: 40
  error: 40

function_parameter_count:
  warning: 5
  error: 5

type_body_length:
  warning: 300
  error: 300

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 40
    error: 40
  excluded:
    - iPhone
    - URL
    - ID
    - T
    - V

identifier_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 50
  excluded:
    - id
    - i
    - j
    - k
    - x
    - y
    - z
    - to
    - by
    - on
    - in
    - at
    - lhs
    - rhs
    - URL
    - ip
    - db

cyclomatic_complexity:
  warning: 8
  error: 8
  ignores_case_statements: false

nesting:
  type_level:
    warning: 3
    error: 3
  function_level:
    warning: 3
    error: 3

large_tuple:
  warning: 3
  error: 3

trailing_whitespace:
  ignores_empty_lines: false
  ignores_comments: false

closure_spacing:
  enabled: true

colon:
  apply_to_dictionaries: true

comma:
  enabled: true

empty_count:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

modifier_order:
  preferred_modifier_order:
    - override
    - acl
    - setterACL
    - dynamic
    - mutating
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

multiline_arguments:
  first_argument_location: any_line
  only_enforce_after_first_closure_on_first_line: false

multiline_parameters:
  allowsSingleLine: false

prefixed_toplevel_constant:
  only_private: false

type_contents_order:
  order:
    - case
    - type_alias
    - associated_type
    - subtype
    - type_property
    - instance_property
    - ib_inspectable
    - ib_outlet
    - initializer
    - type_method
    - view_life_cycle_method
    - ib_action
    - other_method
    - subscript

vertical_whitespace:
  max_empty_lines: 2

xct_specific_matcher:
  matchers:
    - one-argument-asserts

yoda_condition:
  evaluate_constant_value_expressions: true

reporter: "xcode"  # xcode|json|csv|checkstyle|codeclimate|junit|html|emoji|sonarqube|markdown|github-actions-logging
