# StyLua — Lua 代码格式化配置
# 用法：stylua --check --config-path .lintrc/backend/lua/stylua.toml <files>

# 行宽
column_width = 120

# 缩进类型：Tabs 或 Spaces
indent_type = "Spaces"

# 缩进宽度
indent_width = 2

# 引号风格：AutoPreferDouble / AutoPreferSingle / ForceDouble / ForceSingle
quote_style = "AutoPreferDouble"

# 函数调用括号：Always / Never / NoSingleString / NoSingleTable
call_parentheses = "Always"

# 折叠简单语句（单行 if/return）
collapse_simple_statement = "ConditionalOnly"

# 排序 require 语句（实验性）
# sort_requires = { enabled = true, sort_by = "dependency" }
