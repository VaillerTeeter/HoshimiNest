[mypy]
# Python 版本
python_version = 3.11

# 严格模式：等价于开启下方所有严格选项
strict = True

# ── 类型推断 ──────────────────────────────────────
# 禁止返回类型为 Any 的函数（除非明确注解）
warn_return_any = True

# 对未注解的函数发出警告
warn_no_return = True

# 禁止对 Any 类型进行重新赋值
disallow_any_generics = True

# 禁止未注解的函数定义
disallow_untyped_defs = True

# 禁止函数体中有未注解的位置
disallow_incomplete_defs = True

# 对调用未注解函数发出警告
disallow_untyped_calls = True

# 对使用 Any 类型的装饰器发出警告
disallow_untyped_decorators = True

# ── 可选类型 / None 安全 ──────────────────────────
# 禁止隐式 Optional（如 def f(x: int = None)）
no_implicit_optional = True

# 严格 Optional 检查
strict_optional = True

# ── 未使用 / 冗余 ─────────────────────────────────
# 对未使用的 type: ignore 注释发出警告
warn_unused_ignores = True

# 对冗余的类型转换发出警告
warn_redundant_casts = True


# ── 导入 ──────────────────────────────────────────
# 对缺少 stub 或 py.typed 的第三方包：报告但不阻断
ignore_missing_imports = False

# 跟踪所有 import 的完整类型信息
follow_imports = normal

# ── 报告 ──────────────────────────────────────────
# 显示错误代码（便于 # type: ignore[code] 精确忽略）
show_error_codes = True

# 显示错误的上下文
show_error_context = True

# 显示列号
show_column_numbers = True

# ── 排除目录 ─────────────────────────────────────
# exclude 的值是一个正则表达式，使用 (?x) 扩展模式忽略空白，用 | 分隔各路径
exclude = (?x)(
    \.git/
    | \.github/
    | __pycache__/
    | \.venv/
    | venv/
    | env/
    | build/
    | dist/
    | \.mypy_cache/
    | \.pytest_cache/
    | \.tox/
    | node_modules/
  )

# ── 针对特定模块的宽松配置 ────────────────────────
# 测试文件允许未注解的函数
[mypy-tests.*]
disallow_untyped_defs = False
disallow_untyped_calls = False

# 第三方库：无 stub 时忽略缺失导入错误
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-tensorflow.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-django.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True
