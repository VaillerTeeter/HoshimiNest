[tool.black]
# 目标 Python 版本
target-version = ["py311"]

# 最大行长度
line-length = 100

# 字符串引号：双引号（PEP 8 推荐）
skip-string-normalization = false

# 排除目录
exclude = '''
/(
    \.git
  | \.github
  | __pycache__
  | \.venv
  | venv
  | env
  | build
  | dist
  | \.eggs
  | \.mypy_cache
  | \.pytest_cache
  | \.tox
  | node_modules
)/
'''

[tool.isort]
# 与 black 兼容的 profile
profile = "black"

# 最大行长度（与 black 一致）
line_length = 100

# Python 版本
py_version = 311

# import 分组（5 组：future / stdlib / thirdparty / firstparty / localfolder）
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

# 每组之间保留一个空行
lines_after_imports = 2
lines_between_sections = 1

# 强制每个 import 单独一行
force_single_line = false

# 对 from import 使用括号包裹多行
use_parentheses = true

# 尾逗号（与 black 兼容）
include_trailing_comma = true

# 排除目录
skip_glob = [
  ".git/*",
  ".github/*",
  "__pycache__/*",
  ".venv/*",
  "venv/*",
  "env/*",
  "build/*",
  "dist/*",
  ".mypy_cache/*",
  ".pytest_cache/*",
  ".tox/*",
]

[tool.bandit]
# 最低报告风险等级（LOW / MEDIUM / HIGH）
severity = "LOW"

# 最低置信度等级
confidence = "LOW"

# 发现 MEDIUM 及以上问题时退出非零
assert_used = { skips = ["*_test.py", "test_*.py"] }

# 排除目录
exclude_dirs = [
  ".git",
  ".github",
  "__pycache__",
  ".venv",
  "venv",
  "env",
  "build",
  "dist",
  ".mypy_cache",
  ".pytest_cache",
  ".tox",
  "tests",
]

# 跳过的测试 ID
skips = []

[tool.pytest.ini_options]
# 最低 Python 版本
minversion = "7.0"

# 测试文件搜索路径
testpaths = ["tests"]

# 默认命令行参数
addopts = ["-v", "--tb=short", "--strict-markers", "--strict-config"]

# 注册的自定义标记
markers = ["slow: 标记运行较慢的测试（使用 -m 'not slow' 跳过）", "integration: 集成测试", "unit: 单元测试"]

[tool.coverage.run]
# 覆盖率数据收集
source = ["."]
omit = ["tests/*", "test_*.py", "*_test.py", "setup.py", ".venv/*", "venv/*"]

[tool.coverage.report]
# 覆盖率报告
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "@(abc\\.)?abstractmethod",
]
