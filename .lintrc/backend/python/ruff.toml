# Ruff 配置 — 现代 Python 统一 Linter + Formatter
# 文档：https://docs.astral.sh/ruff/configuration/
# 用法：ruff check --config .lintrc/backend/python/ruff.toml . && ruff format --check --config .lintrc/backend/python/ruff.toml .

# ============================================================
# 基础设置
# ============================================================
target-version = "py311"
line-length = 100
indent-width = 4

# ============================================================
# 文件排除
# ============================================================
exclude = [
  ".git",
  ".github",
  "__pycache__",
  ".venv",
  "venv",
  "env",
  "build",
  "dist",
  ".eggs",
  ".mypy_cache",
  ".pytest_cache",
  ".tox",
  "node_modules",
  "migrations",
]

# ============================================================
# Lint 规则选择
# ============================================================
[lint]
# 启用规则集：
# E/W = pycodestyle
# F   = pyflakes
# I   = isort
# N   = pep8-naming
# UP  = pyupgrade（语法现代化）
# B   = flake8-bugbear
# C4  = flake8-comprehensions
# SIM = flake8-simplify
# ANN = flake8-annotations（类型注解）
# S   = flake8-bandit（安全）
# PT  = flake8-pytest-style
# RET = flake8-return
# RUF = Ruff-specific
# PL  = pylint
# TRY = tryceratops（异常处理）
# FLY = flynt（f-string 现代化）
# PERF= perflint（性能）
# Q   = flake8-quotes
# TCH = flake8-type-checking
# TID = flake8-tidy-imports
# G   = flake8-logging-format
# PIE = flake8-pie
# T20 = flake8-print
# ARG = flake8-unused-arguments
# DTZ = flake8-datetimez（时区安全）
# A   = flake8-builtins
# EM  = flake8-errmsg
# LOG = flake8-logging
# ERA = eradicate（注释掉的代码检测）
# D   = pydocstyle（docstring 规范）
# FURB= refurb（代码现代化）
select = [
  "E",
  "W",
  "F",
  "I",
  "N",
  "UP",
  "B",
  "B9",
  "C4",
  "SIM",
  "ANN",
  "S",
  "PT",
  "RET",
  "RUF",
  "PL",
  "TRY",
  "FLY",
  "PERF",
  "Q",
  "TCH",
  "TID",
  "G",
  "PIE",
  "T20",
  "ARG",
  "DTZ",
  "A",
  "EM",
  "LOG",
  "ERA",
  "D",
  "FURB",
]

ignore = [
  # 允许在 __init__.py 中使用 * 导出
  "F403",
  # 允许 Any 类型在某些场景使用（接口边界处偶尔需要）
  "ANN401",
  # __init__ 方法无需声明 None 返回类型（冗余）
  "ANN204",
  # 允许 try/except/else 模式
  "TRY300",
  # Docstring: __init__ 方法 docstring 可省略（类级别 docstring 已足够）
  "D107",
]

# 对测试文件放宽部分规则
[lint.per-file-ignores]
"tests/**/*.py" = [
  "S101",    # 允许 assert
  "S106",    # 允许硬编码密码（测试用）
  "ANN",     # 测试不强制类型注解
  "T20",     # 允许 print
  "PLR2004", # 允许魔法数字
  "ARG001",  # 允许未使用的参数（fixtures）
  "D",       # 测试不强制 docstring
  "ERA",     # 测试允许注释掉的调试代码
]
"conftest.py" = ["ANN", "S101", "D"]
"**/__init__.py" = ["F401"] # 允许 __init__ 中的未使用导入

# ============================================================
# 规则细节
# ============================================================
[lint.pep8-naming]
classmethod-decorators = ["classmethod", "pydantic.validator"]

[lint.flake8-annotations]
allow-star-arg-any = false
suppress-none-returning = false

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Header"]

[lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true
parametrize-names-type = "tuple"

[lint.isort]
known-first-party = ["src", "app"]
force-single-line = false
lines-after-imports = 2
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 5
max-branches = 10
max-returns = 3
max-statements = 40

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-type-checking]
strict = true

[lint.flake8-errmsg]
max-string-length = 30

[lint.pydocstyle]
# Google 风格：首行摘要、Args/Returns/Raises 段落
convention = "google"

# ============================================================
# Formatter 设置
# ============================================================
[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 80
