---
# HLint configuration file

- warn: {name: Use camelCase}
- ignore: {name: Redundant do}
- ignore: {name: Use String}

# Enforce consistent imports
- suggest:
    lhs: "Data.List.nub (Data.List.sort x)"
    rhs: "Data.List.sort (Data.List.nub x)"
    name: Use sort before nub
    note: nub is O(n^2), sort first reduces work

# Error on dangerous patterns
- error: {name: Use head}

# Language extensions to warn about
- extensions:
    - default: false
    - name: OverloadedStrings
    - name: ScopedTypeVariables
    - name: LambdaCase
    - name: TupleSections

# Ignore generated files
- group:
    name: default
    enabled: true

# Custom hints
- hint:
    lhs: "map f (map g x)"
    rhs: "map (f . g) x"
    name: Fuse map/map
    note: Avoids creating an intermediate list
