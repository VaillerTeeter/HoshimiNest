---
run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # --- 默认启用 ---
    - errcheck        # 检查未处理的错误返回值
    - gosimple        # 简化代码建议
    - govet           # go vet 检查（可疑构造）
    - ineffassign     # 检查无效赋值
    - staticcheck     # 静态分析（SA/S/ST/QF 系列）
    - unused          # 检查未使用的代码

    # --- 错误处理 ---
    - errorlint       # 正确包装/比较 error（errors.Is/As）
    - wrapcheck       # 跨包 error 必须 wrap

    # --- 代码质量 ---
    - cyclop          # 圈复杂度检查
    - gocognit        # 认知复杂度检查
    - gocyclo         # 经典圈复杂度
    - maintidx        # 可维护性指数
    - funlen          # 函数长度限制
    - gochecknoinits  # 禁止 init() 函数
    - godot           # 注释句号规范
    - godox           # 禁止 TODO/FIXME 残留
    - gocritic        # 多类别代码评审（200+ 检查）
    - revive          # 替代 golint 的可配置 linter
    - whitespace      # 多余空行检查

    # --- 安全 ---
    - gosec           # 安全漏洞扫描（OWASP 规则）
    - exhaustive      # switch 枚举穷举检查

    # --- 性能 ---
    - prealloc        # slice 预分配建议
    - noctx           # HTTP 请求必须传 context

    # --- 风格 ---
    - gofmt           # 格式化检查
    - goimports       # import 分组和排序
    - misspell        # 英文拼写检查
    - nlreturn        # return 前空行规范
    - unconvert       # 多余类型转换
    - unparam         # 未使用的函数参数
    - dupl            # 重复代码检测
    - gci             # import 分组顺序
    - lll             # 行长度限制
    - nakedret        # 裸 return 检查（大函数中）
    - nestif          # 嵌套 if 复杂度

    # --- 命名 ---
    - stylecheck      # 命名规范（ST 系列）
    - tagliatelle     # struct tag 命名规范

    # --- 现代 Go ---
    - nilerr          # 禁止 `if err != nil { return nil }` 错误模式
    - nilnil          # 禁止返回 (nil, nil)
    - ireturn         # 接口返回检查
    - forcetypeassert  # 禁止非安全类型断言

  disable:
    - exhaustruct    # 结构体所有字段赋值（过于严格）
    - varnamelen     # 变量名长度（有误报）
    - wsl            # 空行风格（过于严格）
    - depguard       # 依赖白名单（需额外配置）
    - paralleltest   # 测试并行（非强制）

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  gocyclo:
    min-complexity: 10

  cyclop:
    max-complexity: 10
    max-package-average-complexity: 5

  gocognit:
    min-complexity: 10

  funlen:
    lines: 60
    statements: 40

  lll:
    line-length: 120
    tab-width: 4

  gci:
    sections:
      - standard                          # 标准库
      - default                           # 外部包
      - prefix(github.com/VaillerTeeter)  # 本项目包
    skip-generated: true

  goimports:
    local-prefixes: github.com/VaillerTeeter

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  nestif:
    min-complexity: 5

  tagliatelle:
    case:
      use-field-name: true
      rules:
        json: snake
        yaml: kebab
        toml: kebab

  gosec:
    severity: low
    confidence: low
    excludes:
      - G104  # 已由 errcheck 覆盖
      - G304  # 文件路径参数（有合理使用场景）

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
    disabled-checks:
      - hugeParam        # 按值传递大结构体（有时是故意的）
      - paramTypeCombine  # 合并参数类型

  revive:
    severity: error
    confidence: 0.8
    rules:
      - name: exported
        severity: error
      - name: unexported-return
      - name: context-as-argument
        arguments:
          - allowTypesBefore: "*testing.T,*github.com/user/repo/testing.Harness"
      - name: error-strings
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  exhaustive:
    default-signifies-exhaustive: true

  dupl:
    threshold: 100

  maintidx:
    under: 20

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - funlen
        - gocognit
        - gocyclo
        - cyclop
        - wrapcheck
        - gosec
        - gochecknoinits
    - path: _test\.go
      text: "Error return value of .* is not checked"
    - linters:
        - lll
      source: "^//go:generate "
  fix: false
