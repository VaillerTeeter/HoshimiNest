version = "3.8.3"

# ============================================================
# Scalafmt — Scala 代码格式化配置
# 目标版本：Scala 2.13 / 3.x
# ============================================================

runner.dialect = scala213  # 可选：scala3

# ---- 行宽 ----
maxColumn = 120

# ---- 缩进 ----
indent.main = 2
indent.significant = 2
indent.callSite = 2
indent.defnSite = 2
indent.caseSite = 5
indent.extendSite = 4
indent.withSiteRelativeToExtends = 3
indent.commaSiteRelativeToEnclosingParens = 2

# ---- 对齐 ----
align.preset = more
align.openParenCallSite = false
align.openParenDefnSite = false
align.openParenTupleSite = false
align.tokens."+" = [
  { code = "->", owner = "Term.ApplyInfix" }
  { code = "<-", owner = "Enumerator.Generator" }
  { code = "=", owner = "(Defn.Type|Defn.Val|Defn.Var|Enumerator.Val)" }
  { code = "//", owner = ".*" }
]

# ---- 换行策略 ----
newlines.source = keep
newlines.topLevelStatementBlankLines = [
  { blanks { before = 1, after = 0, beforeEndMarker = 0 } }
]
newlines.beforeCurlyLambdaParams = multilineWithCaseOnly
newlines.afterCurlyLambdaParams = squash
newlines.alwaysBeforeElseAfterCurlyIf = false
newlines.beforeMultilineDef = unfold

# ---- 尾随逗号 ----
rewrite.trailingCommas.style = multiple  # 多行时添加尾随逗号

# ---- 重写规则 ----
rewrite.rules = [
  RedundantBraces
  RedundantParens
  SortImports
  PreferCurlyFors
  Imports
]
rewrite.imports.sort = scalastyle
rewrite.imports.groups = [
  ["scala\\..*", "java\\..*"]  # 标准库优先
  [".*"]                        # 第三方
]
rewrite.redundantBraces.stringInterpolation = true
rewrite.redundantBraces.defnBodies = "all"

# ---- 空格处理 ----
spaces.inImportCurlyBraces = true
spaces.afterKeywordBeforeParen = true
spaces.inByNameTypes = true
spaces.afterSymbolicDefs = false

# ---- 文档注释 ----
docstrings.style = Asterisk
docstrings.oneLinerThreshold = 80
docstrings.wrap = unfold
docstrings.forceBlankLineBefore = false

# ---- 文件末尾 ----
newlines.alwaysBeforeTopLevelStatements = false

