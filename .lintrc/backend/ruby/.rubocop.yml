---
# Ruby 代码检查配置 — RuboCop
# 目标 Ruby 版本：3.2+
# 运行：bundle exec rubocop --config .rubocop.yml

require:
  - rubocop-performance
  - rubocop-rspec
  - rubocop-rake

inherit_mode:
  merge:
    - Exclude
    - Include

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "db/schema.rb"
    - "db/migrate/*"
    - "bin/**/*"
    - "node_modules/**/*"
    - "tmp/**/*"
    - "log/**/*"
    - "coverage/**/*"
    - "spec/fixtures/**/*"
  # 最大并行处理数
  MaxFilesInCache: 200

# ============================================================
# 布局规则（格式化）
# ============================================================
Layout/LineLength:
  Max: 100
  AllowedPatterns:
    - '\A\s*#'  # 注释行不限制
    - '^\s*it .* do$'
  IgnoredPatterns:
    - "https?://"

Layout/IndentationWidth:
  Width: 2

Layout/TabIndentation:
  Enabled: true

Layout/EndOfLine:
  EnforcedStyle: lf

Layout/TrailingWhitespace:
  Enabled: true

Layout/TrailingEmptyLines:
  Enabled: true
  EnforcedStyle: final_newline

Layout/SpaceAroundOperators:
  Enabled: true

Layout/SpaceAfterColon:
  Enabled: true

Layout/SpaceAfterComma:
  Enabled: true

Layout/SpaceBeforeBlockBraces:
  Enabled: true
  EnforcedStyle: space

Layout/SpaceInsideBlockBraces:
  Enabled: true
  EnforcedStyle: space
  EnforcedStyleForEmptyBraces: no_space

Layout/SpaceInsideHashLiteralBraces:
  Enabled: true
  EnforcedStyle: space

Layout/HashAlignment:
  Enabled: true
  EnforcedHashRocketStyle: key
  EnforcedColonStyle: key

Layout/MultilineMethodCallIndentation:
  Enabled: true
  EnforcedStyle: indented_relative_to_receiver

# ============================================================
# 风格规则
# ============================================================
Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes
  ConsistentQuotesInMultiline: true

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: single_quotes

Style/SymbolArray:
  Enabled: true
  EnforcedStyle: percent

Style/WordArray:
  Enabled: true
  EnforcedStyle: percent
  MinSize: 3

Style/HashSyntax:
  Enabled: true
  EnforcedStyle: ruby3_keywords  # Ruby 3.1+ 简写 hash syntax

Style/TrailingCommaInArguments:
  Enabled: true
  EnforcedStyleForMultiline: comma  # 多行参数末尾必须有逗号

Style/TrailingCommaInArrayLiteral:
  Enabled: true
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  Enabled: true
  EnforcedStyleForMultiline: comma

Style/RescueModifier:
  Enabled: true  # 禁止行内 rescue

Style/GuardClause:
  Enabled: true
  MinBodyLength: 3

Style/NegatedIf:
  Enabled: true

Style/NegatedWhile:
  Enabled: true

Style/IfUnlessModifier:
  Enabled: true

Style/WhileUntilModifier:
  Enabled: true

Style/EvenOdd:
  Enabled: true

Style/Lambda:
  Enabled: true
  EnforcedStyle: literal

Style/Proc:
  Enabled: true

Style/RaiseArgs:
  Enabled: true
  EnforcedStyle: exploded

Style/RedundantReturn:
  Enabled: true
  AllowMultipleReturnValues: false

Style/RedundantSelf:
  Enabled: true

Style/Semicolon:
  Enabled: true
  AllowAsExpressionSeparator: false

Style/BlockDelimiters:
  Enabled: true
  EnforcedStyle: line_count_based  # 单行用 {}，多行用 do/end

Style/EmptyMethod:
  Enabled: true
  EnforcedStyle: compact

Style/AccessModifierDeclarations:
  Enabled: true
  EnforcedStyle: group

Style/ClassAndModuleChildren:
  Enabled: true
  EnforcedStyle: compact

Style/Documentation:
  Enabled: true
  Exclude:
    - "spec/**/*"
    - "test/**/*"

# ============================================================
# 命名规范
# ============================================================
Naming/VariableName:
  Enabled: true
  EnforcedStyle: snake_case

Naming/MethodName:
  Enabled: true
  EnforcedStyle: snake_case

Naming/ClassAndModuleCamelCase:
  Enabled: true

Naming/ConstantName:
  Enabled: true

Naming/FileName:
  Enabled: true
  EnforcedStyle: snake_case

Naming/MethodParameterName:
  Enabled: true
  MinNameLength: 3
  AllowedNames:
    - io
    - id
    - to
    - by
    - on
    - in
    - at
    - ip
    - db
    - os
    - pp
    - tv
    - ui
    - e
    - i
    - j
    - k
    - n
    - x
    - y
    - z

Naming/AccessorMethodName:
  Enabled: true

Naming/BlockParameterName:
  Enabled: true
  MinNameLength: 3
  AllowedNames:
    - e
    - i
    - j
    - k
    - x
    - y
    - z
    - id

Naming/HeredocDelimiterCase:
  Enabled: true
  EnforcedStyle: uppercase

Naming/PredicateName:
  Enabled: true
  NamePrefixBlacklist:
    - is_
    - have_
    - does_

# ============================================================
# 度量规则（Metrics）
# ============================================================
Metrics/AbcSize:
  Max: 15

Metrics/BlockLength:
  Max: 25
  AllowedMethods:
    - describe
    - context
    - it
    - shared_examples
    - shared_examples_for
    - factory

Metrics/BlockNesting:
  Max: 3

Metrics/ClassLength:
  Max: 150
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/CyclomaticComplexity:
  Max: 8

Metrics/MethodLength:
  Max: 15
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/ModuleLength:
  Max: 150

# ============================================================
# Performance 规则（rubocop-performance）
# ============================================================
Performance/ArraySemiInfiniteRangeSlice:
  Enabled: true

Performance/BigDecimalWithNumericArgument:
  Enabled: true

Performance/BlockGivenWithExplicitBlock:
  Enabled: true

Performance/CaseWhenSplat:
  Enabled: true

Performance/Casecmp:
  Enabled: true

Performance/ChainArrayAllocation:
  Enabled: true

Performance/CollectionLiteralInLoop:
  Enabled: true

Performance/CompareWithBlock:
  Enabled: true

Performance/ConcurrentMonotonicTime:
  Enabled: true

Performance/ConstantRegexp:
  Enabled: true

Performance/Count:
  Enabled: true

Performance/DeletePrefix:
  Enabled: true

Performance/DeleteSuffix:
  Enabled: true

Performance/Detect:
  Enabled: true

Performance/DoubleStartEndWith:
  Enabled: true

Performance/EndWith:
  Enabled: true

Performance/FixedSize:
  Enabled: true

Performance/FlatMap:
  Enabled: true

Performance/InefficientHashSearch:
  Enabled: true

Performance/IoReadlines:
  Enabled: true

Performance/MapCompact:
  Enabled: true

Performance/MapMethodChain:
  Enabled: true

Performance/MethodObjectAsBlock:
  Enabled: true

Performance/OpenStruct:
  Enabled: true

Performance/RangeInclude:
  Enabled: true

Performance/RedundantBlockCall:
  Enabled: true

Performance/RedundantEqualityComparisonBlock:
  Enabled: true

Performance/RedundantMatch:
  Enabled: true

Performance/RedundantMerge:
  Enabled: true

Performance/RedundantSortBlock:
  Enabled: true

Performance/RedundantSplitRegexpArgument:
  Enabled: true

Performance/RedundantStringChars:
  Enabled: true

Performance/RegexpMatch:
  Enabled: true

Performance/ReverseEach:
  Enabled: true

Performance/ReverseFirst:
  Enabled: true

Performance/SelectMap:
  Enabled: true

Performance/Size:
  Enabled: true

Performance/SortReverse:
  Enabled: true

Performance/Squeeze:
  Enabled: true

Performance/StartWith:
  Enabled: true

Performance/StringIdentifierArgument:
  Enabled: true

Performance/StringInclude:
  Enabled: true

Performance/StringReplacement:
  Enabled: true

Performance/Sum:
  Enabled: true

Performance/TimesMap:
  Enabled: true

Performance/UnfreezeString:
  Enabled: true

Performance/UriDefaultParser:
  Enabled: true

# ============================================================
# RSpec 规则（rubocop-rspec）
# ============================================================
RSpec/ExampleLength:
  Max: 10

RSpec/MultipleExpectations:
  Max: 3

RSpec/NestedGroups:
  Max: 3

RSpec/DescribeClass:
  Enabled: true

RSpec/EmptyExampleGroup:
  Enabled: true

RSpec/ExpectChange:
  Enabled: true
  EnforcedStyle: block

RSpec/HookArgument:
  Enabled: true
  EnforcedStyle: implicit

RSpec/InstanceVariable:
  Enabled: true

RSpec/LeadingSubject:
  Enabled: true

RSpec/LetSetup:
  Enabled: true

RSpec/MessageSpies:
  Enabled: true
  EnforcedStyle: have_received

RSpec/MissingExampleGroupArgument:
  Enabled: true

RSpec/NamedSubject:
  Enabled: true

RSpec/NoExpectationExample:
  Enabled: true

RSpec/OverwritingSetup:
  Enabled: true

RSpec/PredicateMatcher:
  Enabled: true
  EnforcedStyle: inflected

RSpec/RepeatedDescription:
  Enabled: true

RSpec/RepeatedExample:
  Enabled: true

RSpec/ReturnFromStub:
  Enabled: true
  EnforcedStyle: and_return

RSpec/SharedContext:
  Enabled: true

RSpec/SubjectDeclaration:
  Enabled: true

RSpec/UnspecifiedException:
  Enabled: true

RSpec/VoidExpect:
  Enabled: true

Metrics/ParameterLists:
  Max: 5
  CountKeywordArgs: true

Metrics/PerceivedComplexity:
  Max: 7

# ============================================================
# Lint 规则
# ============================================================
Lint/AmbiguousBlockAssociation:
  Enabled: true

Lint/AmbiguousOperator:
  Enabled: true

Lint/AmbiguousRegexpLiteral:
  Enabled: true

Lint/AssignmentInCondition:
  Enabled: true
  AllowSafeAssignment: true

Lint/DeprecatedClassMethods:
  Enabled: true

Lint/DuplicateBranch:
  Enabled: true

Lint/DuplicateHashKey:
  Enabled: true

Lint/DuplicateMethods:
  Enabled: true

Lint/EmptyBlock:
  Enabled: true
  AllowComments: true

Lint/EmptyClass:
  Enabled: true
  AllowComments: true

Lint/EmptyEnsure:
  Enabled: true

Lint/EmptyExpression:
  Enabled: true

Lint/EnsureReturn:
  Enabled: true

Lint/FlipFlop:
  Enabled: true

Lint/FloatOutOfRange:
  Enabled: true

Lint/FormatParameterMismatch:
  Enabled: true

Lint/InheritException:
  Enabled: true

Lint/InterpolationCheck:
  Enabled: true

Lint/LiteralAsCondition:
  Enabled: true

Lint/Loop:
  Enabled: true

Lint/MissingSuper:
  Enabled: true

Lint/NestedMethodDefinition:
  Enabled: true

Lint/NonLocalExitFromIterator:
  Enabled: true

Lint/OrAssignmentToConstant:
  Enabled: true

Lint/ParenthesesAsGroupedExpression:
  Enabled: true

Lint/RaiseException:
  Enabled: true

Lint/RedundantCopDisableDirective:
  Enabled: true

Lint/RedundantRequireStatement:
  Enabled: true

Lint/RedundantSplatExpansion:
  Enabled: true

Lint/RedundantStringCoercion:
  Enabled: true

Lint/RequireRelativeSelfPath:
  Enabled: true

Lint/RescueType:
  Enabled: true

Lint/ReturnInVoidContext:
  Enabled: true

Lint/SafeNavigationChain:
  Enabled: true

Lint/SafeNavigationConsistency:
  Enabled: true

Lint/ScriptPermission:
  Enabled: true

Lint/SelfAssignment:
  Enabled: true

Lint/ShadowedException:
  Enabled: true

Lint/ShadowingOuterLocalVariable:
  Enabled: true

Lint/SuppressedException:
  Enabled: true
  AllowNil: false

Lint/ToJSON:
  Enabled: true

Lint/ToEnumArguments:
  Enabled: true

Lint/TrailingCommaInAttributeDeclaration:
  Enabled: true

Lint/UnderscorePrefixedVariableName:
  Enabled: true

Lint/UnexpectedBlockArity:
  Enabled: true

Lint/UnifiedInteger:
  Enabled: true

Lint/UnreachableCode:
  Enabled: true

Lint/UnreachableLoop:
  Enabled: true

Lint/UselessAssignment:
  Enabled: true

Lint/UselessElse:
  Enabled: true

Lint/UselessMethodDefinition:
  Enabled: true

Lint/UselessSetterCall:
  Enabled: true

Lint/UselessTimes:
  Enabled: true

Lint/Void:
  Enabled: true

# ============================================================
# 安全规则
# ============================================================
Security/Eval:
  Enabled: true

Security/JSONLoad:
  Enabled: true
  PreferredMethods:
    JSON.load: JSON.parse

Security/MarshalLoad:
  Enabled: true

Security/Open:
  Enabled: true

Security/YAMLLoad:
  Enabled: true
