---
detekt:
  # 错误阈值：超过此数量 CI 失败
  maxIssues: 0
  # 基线文件（忽略已知问题，逐步改善）
  baseline: detekt-baseline.xml
  config:
    validation: true
    warningsAsErrors: true

build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

processors:
  active: true
  exclude:
    - DetektProgressListener

console-reports:
  active: true

output-reports:
  active: true

# ============================================================
# 复杂度检查
# ============================================================
complexity:
  active: true

  CyclomaticComplexMethod:
    active: true
    threshold: 10
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
    ignoreNestingFunctions: false

  CognitiveComplexMethod:
    active: true
    threshold: 10

  LongMethod:
    active: true
    threshold: 60  # 行数

  LongParameterList:
    active: true
    functionThreshold: 5
    constructorThreshold: 5
    ignoreDefaultParameters: false
    ignoreDataClasses: false
    ignoreAnnotated: ["Inject"]

  LargeClass:
    active: true
    threshold: 400  # 行数

  TooManyFunctions:
    active: true
    thresholdInFiles: 10
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 8
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: false

  NamedArguments:
    active: true
    threshold: 3  # 超过 3 个参数建议使用具名参数

  NestedBlockDepth:
    active: true
    threshold: 3

  StringLiteralDuplication:
    active: true
    threshold: 2
    ignoreAnnotation: true
    excludeStringsWithLessThan5Characters: true
    ignoreStringsRegex: "$^"

# ============================================================
# 相关性检查（Coroutines）
# ============================================================
coroutines:
  active: true

  GlobalCoroutineUsage:
    active: true

  RedundantSuspendModifier:
    active: true

  SleepInsteadOfDelay:
    active: true

  SuspendFunWithCoroutineScopeReceiver:
    active: true

  SuspendFunWithFlowReturnType:
    active: true

# ============================================================
# 空值安全
# ============================================================
empty-blocks:
  active: true

  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignore|expected).*"

  EmptyClassBlock:
    active: true

  EmptyDefaultConstructor:
    active: true

  EmptyDoWhileBlock:
    active: true

  EmptyElseBlock:
    active: true

  EmptyFinallyBlock:
    active: true

  EmptyForBlock:
    active: true

  EmptyFunctionBlock:
    active: true
    ignoreOverridden: false

  EmptyIfBlock:
    active: true

  EmptyInitBlock:
    active: true

  EmptyKtFile:
    active: true

  EmptySecondaryConstructor:
    active: true

  EmptyTryBlock:
    active: true

  EmptyWhenBlock:
    active: true

  EmptyWhileBlock:
    active: true

# ============================================================
# 异常处理
# ============================================================
exceptions:
  active: true

  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames:
      - equals
      - finalize
      - hashCode
      - readObject
      - readObjectNoData
      - readResolve
      - toString
      - writeObject

  InstanceOfCheckForException:
    active: true

  NotImplementedDeclaration:
    active: true

  ObjectExtendsThrowable:
    active: true

  PrintStackTrace:
    active: true

  RethrowCaughtException:
    active: true

  ReturnFromFinally:
    active: true
    ignoreLabeled: false

  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - InterruptedException
      - MalformedURLException
    allowedExceptionNameRegex: "_|(ignore|expected).*"

  ThrowingExceptionFromFinally:
    active: true

  ThrowingExceptionInMain:
    active: true

  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    allowedExceptionTypes:
      - IllegalArgumentException
      - IllegalStateException
      - IOException

  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - Exception
      - IllegalMonitorStateException
      - NullPointerException
      - IndexOutOfBoundsException
      - RuntimeException
      - Throwable
    allowedExceptionNameRegex: "_|(ignore|expected).*"

  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - Error
      - Exception
      - Throwable
      - RuntimeException

# ============================================================
# 命名规范
# ============================================================
naming:
  active: true

  BooleanPropertyNaming:
    active: true
    allowedPattern: "^(is|has|are|can|should|will|was|were|does|did)[A-Z].*"
    ignoreOverridden: true

  ClassNaming:
    active: true
    classPattern: "[A-Z][a-zA-Z0-9]*"

  ConstructorParameterNaming:
    active: true
    parameterPattern: "[a-z][A-Za-z0-9]*"

  EnumNaming:
    active: true
    enumEntryPattern: "[A-Z][_A-Z0-9]*"

  ForbiddenClassName:
    active: false

  FunctionMaxLength:
    active: true
    maximumFunctionNameLength: 30

  FunctionMinLength:
    active: true
    minimumFunctionNameLength: 3
    ignoreFunction:
      - main

  FunctionNaming:
    active: true
    functionPattern: "([a-z][a-zA-Z0-9]*)|(`.*`)"
    excludeClassPattern: "$^"
    ignoreAnnotated:
      - Composable

  FunctionParameterNaming:
    active: true
    parameterPattern: "[a-z][A-Za-z0-9]*"

  InvalidPackageDeclaration:
    active: true
    rootPackage: ""
    requireRootInDeclaration: false

  LambdaParameterNaming:
    active: true
    parameterPattern: "[a-z][A-Za-z0-9]*|_"

  MatchingDeclarationName:
    active: true
    mustBeFirst: true

  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true

  NoNameShadowing:
    active: true

  NonBooleanPropertyPrefixedWithIs:
    active: true

  ObjectPropertyNaming:
    active: true
    constantPattern: "[A-Za-z][_A-Za-z0-9]*"
    propertyPattern: "[A-Za-z][_A-Za-z0-9]*"
    privatePropertyPattern: "(_)?[A-Za-z][_A-Za-z0-9]*"

  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][_A-Z0-9]*"
    propertyPattern: "[A-Za-z][_A-Za-z0-9]*"
    privatePropertyPattern: "_?[A-Za-z][_A-Za-z0-9]*"

  VariableMaxLength:
    active: true
    maximumVariableNameLength: 40

  VariableMinLength:
    active: true
    minimumVariableNameLength: 2
    ignoreVariable:
      - i
      - j
      - k
      - x
      - y
      - z
      - e

  VariableNaming:
    active: true
    variablePattern: "[a-z][A-Za-z0-9]*"
    privateVariablePattern: "(_)?[a-z][A-Za-z0-9]*"
    excludeClassPattern: "$^"

# ============================================================
# 性能
# ============================================================
performance:
  active: true

  ArrayPrimitive:
    active: true

  CouldBeSequence:
    active: true
    threshold: 3

  ForEachOnRange:
    active: true

  SpreadOperator:
    active: true
    excludedClasses:
      - "io.kotest.matchers.string.StringMatchers"

  UnnecessaryPartOfBinaryExpression:
    active: true

  UnnecessaryTemporaryInstantiation:
    active: true

# ============================================================
# 潜在 Bug
# ============================================================
potential-bugs:
  active: true

  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - "kotlin.String"

  CastToNullableType:
    active: true

  Deprecation:
    active: true  # 禁止使用已废弃 API

  DontDowncastCollectionTypes:
    active: true

  DoubleMutabilityForCollection:
    active: true
    mutableTypes:
      - MutableList
      - MutableMap
      - MutableSet
      - ArrayDeque

  ElseCaseInsteadOfExhaustiveWhen:
    active: true

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  EqualsWithHashCodeExist:
    active: true

  ExitOutsideMain:
    active: true

  HasPlatformType:
    active: true

  IgnoredReturnValue:
    active: true
    restrictToAnnotatedMethods: true
    returnValueAnnotations:
      - CheckReturnValue
      - CheckResult

  ImplicitDefaultLocale:
    active: true

  ImplicitUnitReturnType:
    active: true
    allowExplicitReturnType: true

  InvalidRange:
    active: true

  IteratorHasNextCallsNextMethod:
    active: true

  IteratorNotThrowingNoSuchElementException:
    active: true

  MapGetWithNotNullAssertionOperator:
    active: true

  MissingPackageDeclaration:
    active: true

  NullCheckOnMutableProperty:
    active: true

  NullableToStringCall:
    active: true

  UnconditionalJumpStatementInLoop:
    active: true

  UnnecessaryNotNullCheck:
    active: true

  UnnecessaryNotNullOperator:
    active: true

  UnnecessarySafeCall:
    active: true

  UnreachableCode:
    active: true

  UnsafeCallOnNullableType:
    active: true
    excludes:
      - "**/test/**"

  UnsafeCast:
    active: true
    excludes:
      - "**/test/**"

  UselessPostfixExpression:
    active: true

  WrongEqualsTypeParameter:
    active: true

# ============================================================
# 代码风格
# ============================================================
style:
  active: true

  CanBeNonNullable:
    active: true

  CascadingCallWrapping:
    active: true
    includeElvis: true

  ClassOrdering:
    active: true

  CollapsibleIfStatements:
    active: true

  DataClassContainsFunctions:
    active: true
    conversionFunctionPrefix:
      - to
      - from

  DataClassShouldBeImmutable:
    active: true

  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 2

  EqualsNullCall:
    active: true

  EqualsOnSignatureLine:
    active: true

  ExplicitCollectionElementAccessMethod:
    active: true

  ExplicitItLambdaParameter:
    active: true

  ExpressionBodySyntax:
    active: true
    includeLineWrapping: false

  ForbiddenComment:
    active: true
    comments:
      - reason: "Use a proper issue tracker"
        value: "FIXME:"
      - reason: "Revisit before release"
        value: "STOPSHIP:"
    allowedPatterns: ""

  ForbiddenImport:
    active: false

  ForbiddenVoid:
    active: true
    ignoreOverridden: false
    ignoreUsageInGenerics: false

  FunctionOnlyReturningConstant:
    active: true
    ignoreOverridableFunction: true
    ignoreActualFunction: true

  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 2

  MagicNumber:
    active: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: false
    ignoreNamedArgument: true
    ignoreEnums: false
    ignoreRanges: false
    ignoreExtensionFunctions: true

  MandatoryBracesIfStatements:
    active: true

  MandatoryBracesLoops:
    active: true

  MaxChainedCallsOnSameLine:
    active: true
    maxChainedCalls: 3

  MaxLineLength:
    active: true
    maxLineLength: 100
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false

  MultilineLambdaItParameter:
    active: true

  MultilineRawStringIndentation:
    active: true
    indentSize: 4

  NestedClassesVisibility:
    active: true

  NewLineAtEndOfFile:
    active: true

  NoTabs:
    active: true

  NullableBooleanCheck:
    active: true

  ObjectLiteralToLambda:
    active: true

  OptionalAbstractKeyword:
    active: true

  OptionalUnit:
    active: true

  PreferToOverPairSyntax:
    active: true

  ProtectedMemberInFinalClass:
    active: true

  RedundantExplicitType:
    active: true

  RedundantHigherOrderMapUsage:
    active: true

  RedundantVisibilityModifierRule:
    active: true

  ReturnCount:
    active: true
    max: 3
    excludedFunctions:
      - equals
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: false

  SafeCast:
    active: true

  SerialVersionUIDInSerializableClass:
    active: true

  SpacingBetweenPackageAndImports:
    active: true

  ThrowsCount:
    active: true
    max: 3
    excludeGuardClauses: false

  TrailingWhitespace:
    active: true

  TrimMultilineRawString:
    active: true

  UnderscoresInNumericLiterals:
    active: true
    acceptableLength: 4
    allowNonStandardGrouping: false

  UnnecessaryAbstractClass:
    active: true

  UnnecessaryAnnotationUseSiteTarget:
    active: true

  UnnecessaryApply:
    active: true

  UnnecessaryBackticks:
    active: true

  UnnecessaryBracesAroundTrailingLambda:
    active: true

  UnnecessaryFilter:
    active: true

  UnnecessaryInheritance:
    active: true

  UnnecessaryInnerClass:
    active: true

  UnnecessaryLet:
    active: true

  UnnecessaryParentheses:
    active: true
    allowForUnclearPrecedence: false

  UntilInsteadOfRangeTo:
    active: true

  UnusedImports:
    active: true

  UnusedParameter:
    active: true
    allowedNames: "ignored|expected"

  UnusedPrivateMember:
    active: true
    allowedNames: ""

  UnusedPrivateProperty:
    active: true
    allowedNames: "_"

  UseAnyOrNoneInsteadOfFind:
    active: true

  UseArrayLiteralsInAnnotations:
    active: true

  UseCheckNotNull:
    active: true

  UseCheckOrError:
    active: true

  UseDataClass:
    active: true
    allowVars: false

  UseEmptyCounterpart:
    active: true

  UseIfEmptyOrIfBlank:
    active: true

  UseIfInsteadOfWhen:
    active: true
    ignoreWhenContainingVariableDeclaration: false

  UseIsNullOrEmpty:
    active: true

  UseLet:
    active: false

  UseOrEmpty:
    active: true

  UseRequire:
    active: true

  UseRequireNotNull:
    active: true

  UseSumOfInsteadOfFlatMapSize:
    active: true

  UseWithIndex:
    active: true

  VarCouldBeVal:
    active: true
    ignoreLateinitVar: false

  WildcardImport:
    active: true
    excludeImports:
      - "kotlinx.android.synthetic.*"
