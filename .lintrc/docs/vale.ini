# Vale 配置 — 技术文档写作质量检查
# 文档：https://vale.sh/docs/vale-cli/structure/
# 用法：vale --config=.lintrc/docs/vale.ini docs/

StylesPath = vale-styles

# 最低报告级别：suggestion < warning < error
MinAlertLevel = suggestion

# ============================================================
# 作用于所有文件的基础规则
# ============================================================
[*]
# 内置包：
#   Microsoft   — 微软写作风格指南
#   Google      — Google 开发者文档风格指南
#   write-good  — 清晰写作建议
#   proselint   — 散文质量检查
Packages = Microsoft, Google, write-good, proselint

# Microsoft 风格规则
Microsoft.Auto                 = warning   # 避免 "auto-" 前缀
Microsoft.Avoid                = error     # 禁止词汇表中的词
Microsoft.Contractions         = suggestion
Microsoft.FirstPerson          = warning   # 避免第一人称（"I", "we"）
Microsoft.FutureTense          = warning   # 避免 "will" 表述
Microsoft.Gender               = error     # 性别中立语言
Microsoft.GenderBias           = error     # 性别偏见词汇
Microsoft.HeadingAcronyms      = warning
Microsoft.Headings             = warning   # 标题大小写
Microsoft.Keyboard             = warning   # 键盘快捷键格式
Microsoft.OxfordComma          = warning   # 牛津逗号
Microsoft.Passive              = warning   # 避免被动语态
Microsoft.RangeFormat          = warning   # 范围格式
Microsoft.Spacing              = error     # 多余空格
Microsoft.Units                = warning   # 单位格式
Microsoft.URLFormat            = warning   # URL 格式

# Google 风格规则
Google.Acronyms                = warning   # 首次使用说明缩写
Google.Exclamation             = error     # 禁止感叹号
Google.FirstPerson             = warning
Google.Gender                  = error
Google.Headings                = warning
Google.LyHyphens               = warning   # "-ly" 结尾词不加连字符
Google.OptionalPlurals         = warning
Google.Parens                  = warning   # 括号使用
Google.Passive                 = warning
Google.Periods                 = warning
Google.Quotes                  = warning
Google.Ranges                  = warning
Google.Slang                   = warning   # 口语化表达
Google.Spelling                = error     # 拼写（内置词表）
Google.We                      = warning   # 避免 "we"
Google.Will                    = warning

# write-good 规则
write-good.Cliches             = warning   # 陈词滥调
write-good.E-Prime             = suggestion
write-good.Illusions           = error     # 重复词
write-good.Passive             = warning
write-good.So                  = warning   # 以 "So" 开头
write-good.Suddenly            = warning
write-good.ThereIs             = warning   # "There is/are"
write-good.TooWordy            = warning   # 冗长表达
write-good.Weasel              = warning   # 模糊词

# proselint 规则
proselint.Annotations          = warning   # 保留 TODO/FIXME
proselint.But                  = suggestion  # 句首不用 But
proselint.Cliches              = warning
proselint.CorporateSpeak       = warning   # 企业用语
proselint.Dates                = warning   # 日期格式
proselint.GarnerMisused        = warning   # 常见误用
proselint.Hedging              = warning   # 不确定性词汇
proselint.Hyperbole            = warning   # 夸张词汇
proselint.Jargon               = warning
proselint.Needless             = warning   # 不必要词汇
proselint.Oxymorons            = warning   # 矛盾修辞
proselint.Skunked              = warning   # 争议词汇
proselint.Spelling             = error
proselint.Typography           = warning   # 排版问题
proselint.Uncomparables        = warning   # 不可比较形容词
proselint.Weasel               = warning

# ============================================================
# Markdown 文件
# ============================================================
[*.{md,mdx}]
TokenIgnores = (\`[^\`]+\`), (```[\s\S]*?```), (\[.*?\]\(.*?\))
BlockIgnores = (```[\s\S]*?```)

# ============================================================
# reStructuredText
# ============================================================
[*.rst]
BlockIgnores = (.. code-block::[\s\S]*?(?=\n\n|\Z))

# ============================================================
# AsciiDoc
# ============================================================
[*.adoc]
BlockIgnores = (----[\s\S]*?----)

# ============================================================
# HTML
# ============================================================
[*.{html,htm}]
BlockIgnores = (<code[\s\S]*?</code>), (<pre[\s\S]*?</pre>)
