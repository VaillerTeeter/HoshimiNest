---
version: v2

# ============================================================
# buf — Protocol Buffers lint & 破坏性变更检测配置
# 文档：https://buf.build/docs/configuration/v2/buf-yaml
# ============================================================

modules:
  - path: .
    # 排除生成代码目录
    excludes:
      - vendor/
      - gen/
      - third_party/

lint:
  # 使用 DEFAULT 规则集（包含 BASIC + MINIMAL）
  use:
    - DEFAULT
  except: []

  # 忽略特定目录的 lint
  ignore:
    - vendor
    - gen
    - third_party

  # ── DEFAULT 规则集包含的关键规则 ──────────────────────────
  # MINIMAL:
  #   DIRECTORY_SAME_PACKAGE    目录内 .proto 文件必须使用同一 package
  #   PACKAGE_DEFINED           必须定义 package
  #   PACKAGE_DIRECTORY_MATCH   package 名称与目录结构一致
  #   PACKAGE_SAME_*            同 package 下 go_package/java_package 等必须一致
  #
  # BASIC（含 MINIMAL）:
  #   ENUM_FIRST_VALUE_ZERO     枚举第一个值必须为 0
  #   ENUM_NO_ALLOW_ALIAS       禁止 allow_alias 选项
  #   IMPORT_NO_PUBLIC          禁止 import public
  #   IMPORT_NO_WEAK            禁止 import weak
  #   MESSAGE_NO_EMBED_FIELDS   不嵌入字段（oneof 除外）
  #
  # DEFAULT（含 BASIC）:
  #   ENUM_VALUE_UPPER_SNAKE_CASE  枚举值必须全大写蛇形
  #   FIELD_LOWER_SNAKE_CASE       字段名必须蛇形小写
  #   MESSAGE_PASCAL_CASE          消息名必须 PascalCase
  #   PACKAGE_LOWER_SNAKE_CASE     package 名小写蛇形
  #   RPC_PASCAL_CASE              RPC 方法名 PascalCase
  #   SERVICE_PASCAL_CASE          Service 名 PascalCase
  #   COMMENT_ENUM / MESSAGE / RPC / SERVICE  重要类型必须有注释
  # ─────────────────────────────────────────────────────────

  enum_zero_value_suffix: _UNSPECIFIED
  service_suffix: Service

  # 是否允许 Comment 规则的 leading comment
  allow_comment_ignores: true

breaking:
  # 检测 API 破坏性变更
  use:
    - FILE
  # FILE 规则集检测内容：
  #   字段被删除或改变类型
  #   消息/枚举/服务被删除
  #   枚举值被删除
  #   必选字段变为可选（proto2）
  #   RPC 签名变更

  ignore:
    - vendor
    - gen
# 比较目标（CI 中通过 buf breaking --against 指定）
# against: ".git#branch=main"
