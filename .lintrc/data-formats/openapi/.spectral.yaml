---
# Spectral — OpenAPI / Swagger / AsyncAPI lint 配置
# 文档：https://docs.stoplight.io/docs/spectral
# 支持：OpenAPI 2.x (Swagger), OpenAPI 3.x, AsyncAPI 2.x/3.x

extends:
  # 内置规则集
  - spectral:oas   # OpenAPI 2/3 规则集
  # - spectral:asyncapi  # 如需 AsyncAPI 支持，取消注释

# ── 自定义规则覆盖 ─────────────────────────────────────────
rules:
  # ─── 基础 OpenAPI 规范强制 ────────────────────────────────
  # 所有操作必须有 operationId
  operation-operationId: error

  # operationId 格式：camelCase
  operation-operationId-valid-in-url: error

  # 所有操作必须有 tags
  operation-tags: error

  # 所有操作必须有 summary（不超过 120 字符）
  operation-summary-formatted: off

  # ─── 描述 & 文档 ─────────────────────────────────────────
  # info.contact 必须存在
  info-contact: error

  # info.license 必须存在
  info-license: error

  # info.description 必须存在
  info-description: error

  # 所有 schema 属性必须有 description
  oas3-schema: error

  # ─── 安全 ────────────────────────────────────────────────
  # 所有操作必须定义 security scheme
  operation-security-defined: error

  # 禁止 http security scheme 使用 basic（建议 bearer）
  no-http-basic: off   # 内置规则名 no-$ref-siblings 等

  # ─── 响应规范 ─────────────────────────────────────────────
  # 操作必须定义 2xx 响应
  operation-success-response: error

  # 每个响应必须有 description
  # （内置规则已覆盖）

  # ─── 路径规范 ─────────────────────────────────────────────
  # 路径参数必须定义
  path-params: error

  # 禁止路径中包含 query 参数
  path-not-include-query: error

  # 禁止路径以斜线结尾
  path-keys-no-trailing-slash: error

  # ─── 未使用组件规范 ──────────────────────────────────────────
  # 禁止在 components 中定义但从未被 $ref 引用的冗余组件
  oas3-unused-component: error

  # ─── 自定义规则示例 ───────────────────────────────────────
  # 所有请求体必须有 description
  request-body-must-have-description:
    description: "Request body should have a description"
    message: "{{description}} - {{path}}"
    severity: error
    given: "$.paths[*][*].requestBody"
    then:
      field: description
      function: truthy

  # 响应 schema 禁止使用 additionalProperties: true（可能导致类型不安全）
  no-additional-properties:
    description: "Avoid using additionalProperties: true in response schemas"
    message: "{{path}} uses additionalProperties: true"
    severity: error
    given: "$.paths[*][*].responses[*].content[*].schema"
    then:
      field: additionalProperties
      function: pattern
      functionOptions:
        notMatch: "^true$"
