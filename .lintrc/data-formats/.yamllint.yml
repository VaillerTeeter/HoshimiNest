---
# yamllint 配置 — 极严格模式
# 文档：https://yamllint.readthedocs.io/en/stable/rules.html
# 用法：yamllint -c .lintrc/data-formats/.yamllint.yml .

extends: default

rules:
  # ============================================================
  # 行与文档结构
  # ============================================================
  line-length:
    max: 120
    level: error
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true

  document-start:
    present: true
    level: error

  document-end:
    present: false
    level: error

  new-line-at-end-of-file:
    level: error

  new-lines:
    type: unix

  # ============================================================
  # 缩进
  # ============================================================
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
    level: error

  # ============================================================
  # 空格
  # ============================================================
  trailing-spaces:
    level: error

  empty-lines:
    max: 2
    max-start: 0
    max-end: 0
    level: error

  empty-values:
    forbid-in-block-mappings: true
    forbid-in-flow-mappings: true
    level: error

  # ============================================================
  # 冒号、逗号、连字符
  # ============================================================
  colons:
    max-spaces-before: 0
    max-spaces-after: 1
    level: error

  commas:
    max-spaces-before: 0
    min-spaces-after: 1
    max-spaces-after: 1
    level: error

  hyphens:
    max-spaces-after: 1
    level: error

  # ============================================================
  # 括号与方括号
  # ============================================================
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0
    level: error

  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0
    level: error

  # ============================================================
  # 注释
  # ============================================================
  comments:
    level: error
    min-spaces-from-content: 2
    require-starting-space: true

  comments-indentation:
    level: error

  # ============================================================
  # 引号与字符串
  # ============================================================
  quoted-strings: disable

  # ============================================================
  # 键
  # ============================================================
  key-duplicates:
    forbid-duplicated-merge-keys: true
    level: error

  key-ordering: disable

  # ============================================================
  # 真值规范化
  # ============================================================
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "yes"
      - "no"
      - "on"
      - "off"
    check-keys: true
    level: error

  # ============================================================
  # YAML 1.1 遗留问题
  # ============================================================
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: false
    level: error
