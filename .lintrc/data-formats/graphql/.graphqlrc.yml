---
# GraphQL 项目配置 — GraphQL Config (graphql-config)
# 工具集成：graphql-eslint, graphql-inspector, graphql-schema-linter
# 文档：https://the-guild.dev/graphql/config/docs

schema: "**/*.graphql"  # schema 文件路径（glob）
documents: "**/*.{graphql,gql}"  # 查询/变量文件路径

extensions:
  # ── graphql-eslint 集成 ──────────────────────────────────
  # 需要：@graphql-eslint/eslint-plugin
  # 在 .eslintrc 中配置 overrides for *.graphql

  # ── graphql-schema-linter 集成 ───────────────────────────
  # 安装：npm install -g graphql-schema-linter
  # 运行：graphql-schema-linter --rules "..."
  schema-linter:
    rules:
      # 枚举类型
      - enum-values-all-caps          # 枚举值全大写
      - enum-values-have-descriptions  # 枚举值必须有描述

      # 字段规范
      - fields-have-descriptions       # 字段必须有描述
      - fields-are-camel-cased         # 字段名驼峰

      # 类型规范
      - types-have-descriptions        # 类型必须有描述
      - type-fields-sorted-alphabetically  # 字段按字母排序（可选）

      # 参数规范
      - arguments-have-descriptions    # 参数必须有描述
      - arguments-are-camel-cased      # 参数名驼峰

      # 输入类型
      - input-object-fields-sorted-alphabetically  # 输入类型字段排序（可选）
      - input-object-values-are-camel-cased

      # 关系规范
      - relay-connection-types-spec    # 遵循 Relay Connection 规范
      - relay-connection-arguments-spec

      # 弃用
      - provided-required-arguments    # 必填参数不能设默认值同时标 @deprecated

    customRulePaths: []

  # ── graphql-inspector 集成 ────────────────────────────────
  # 安装：npm install -g @graphql-inspector/cli
  # 破坏性变更检测：graphql-inspector diff old.graphql new.graphql
  inspector:
    # 检测类型
    rules:
      - BreakingChange           # 所有破坏性变更
      - DangerousChange          # 潜在危险变更（如字段变为必填）
      - NonBreakingChange        # 非破坏性变更（仅记录）
    # 破坏性变更是否导致 CI 失败
    failOnBreaking: true
    failOnDangerous: true
